name: CI Pipeline

on:
  workflow_dispatch:
  # push:
  #   branches: [feature/ci-pipeline]

jobs:

  frontend:
    #Github runners are virtual machines that run your workflows. You can specify the type of runner you want to use for your job. In this case, we are using the latest version of Ubuntu as our runner.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      
      - name: Setup node js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install npm packages
        run: npm install
        working-directory: ./frontend

      - name: Run Lint
        run: npm run lint
        working-directory: ./frontend

      - name: Run Tests
        run: npm test
        working-directory: ./frontend

      - name: Docker Setup [Login]
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Docker Build & Push
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/devboard-fe:latest


  backend:
    #Github runners are virtual machines that run your workflows. You can specify the type of runner you want to use for your job. In this case, we are using the latest version of Ubuntu as our runner.
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      
      - name: Setup go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: go.sum

      - name: Run Go Formatter
        run: go fmt
        working-directory: ./backend

      - name: Run Go Vet
        run: go vet
        working-directory: ./backend

      - name: Run Tests
        run: go test
        working-directory: ./backend

      - name: Docker Setup [Login]
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Docker Build & Push
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/devboard-be:latest
  
  deploy:
    needs: [frontend, backend]
    uses: ./.github/workflows/new-cd.yml
    secrets: inherit

