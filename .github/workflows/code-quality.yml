#Goal - I have to do SAST for my Code


name: Code Quality

on:
  workflow_call: # we can call this workflow before/after any other workflow

jobs:
  sast:
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/Checkout@v7

      - name: Setup node js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install npm packages
        run: npm install
        working-directory: ./frontend

      - name: Run Lint
        run: npm run lint
        working-directory: ./frontend
      
      - name: Setup go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: go.sum

      - name: Run Go Formatter
        run: go fmt
        working-directory: ./backend

      - name: Run Go Vet
        run: go vet
        working-directory: ./backend